# RAG Configuration
rag:
  enabled: true
  
  # Embedding model
  embedding_model: "all-MiniLM-L6-v2"
  embedding_device: "cpu"
  
  # Vector store
  vector_store_path: "./data/vector_store"
  index_name: "ai_os_index"
  
  # Document processing
  chunk_size: 500
  chunk_overlap: 50
  max_file_size_mb: 50
  
  # Supported file types
  supported_extensions:
    - ".txt"
    - ".md"
    - ".markdown"
    - ".py"
    - ".js"
    - ".ts"
    - ".jsx"
    - ".tsx"
    - ".java"
    - ".c"
    - ".cpp"
    - ".h"
    - ".hpp"
    - ".go"
    - ".rs"
    - ".rb"
    - ".php"
    - ".sh"
    - ".bash"
    - ".zsh"
    - ".json"
    - ".yaml"
    - ".yml"
    - ".xml"
    - ".html"
    - ".htm"
    - ".css"
    - ".scss"
    - ".sass"
    - ".sql"
    - ".pdf"
    - ".docx"
    - ".doc"
  
  # Search settings
  search_top_k: 5
  similarity_threshold: 0.7
  hybrid_search_alpha: 0.5

# CLI Configuration
cli:
  theme: "dark"
  show_timestamps: true
  max_history: 100
  auto_suggest: true
  
# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/ai-os.log"
  max_size_mb: 10
  backup_count: 5
