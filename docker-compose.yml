# ================================================================
# VOIDER — Docker Compose
# One-command deployment for the VOIDER AI OS Companion
#
# Quick start:
#   docker compose up -d            # Ollama (local) mode
#   VOIDER_PROVIDER=groq VOIDER_API_KEY=gsk_xxx docker compose up -d
# ================================================================

name: voider

services:

  # ── VOIDER API + UI ─────────────────────────────────────────
  voider:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: voider-ai-os:latest
    container_name: voider
    restart: unless-stopped
    ports:
      - "${VOIDER_PORT:-8000}:8000"
    volumes:
      - voider-data:/app/data
      - voider-logs:/app/logs
      - ./config:/app/config   # live config edits without rebuild
    environment:
      # ── LLM Provider (ollama | groq | openai | gemini | xai) ──
      - VOIDER_PROVIDER=${VOIDER_PROVIDER:-ollama}
      - VOIDER_MODEL=${VOIDER_MODEL:-}
      - VOIDER_API_KEY=${VOIDER_API_KEY:-}
      - VOIDER_OLLAMA_HOST=http://ollama:11434
      # ── Server ───────────────────────────────────────────────
      - AIOS_HOST=0.0.0.0
      - AIOS_PORT=8000
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    depends_on:
      ollama:
        condition: service_started
    networks:
      - voider-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Ollama (local LLM) ──────────────────────────────────────
  # Set VOIDER_PROVIDER=groq/openai/etc. to skip using Ollama
  ollama:
    image: ollama/ollama:latest
    container_name: voider-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
    profiles:
      - ollama       # only started when --profile ollama or by default
      - default
    networks:
      - voider-net
    # Pull default model automatically on first boot
    entrypoint: >
      sh -c "
        ollama serve &
        sleep 8
        echo '📦 Pulling llama3.2 (first-run only)...'
        ollama pull ${OLLAMA_MODEL:-llama3.2} || true
        wait
      "

  # ── Ollama GPU variant (optional) ───────────────────────────
  # Uncomment and run: docker compose --profile gpu up -d
  # ollama-gpu:
  #   image: ollama/ollama:latest
  #   container_name: voider-ollama-gpu
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-models:/root/.ollama
  #   environment:
  #     - OLLAMA_ORIGINS=*
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]
  #   profiles:
  #     - gpu
  #   networks:
  #     - voider-net

# ── Volumes ─────────────────────────────────────────────────
volumes:
  voider-data:
    driver: local
  voider-logs:
    driver: local
  ollama-models:
    driver: local

# ── Networks ────────────────────────────────────────────────
networks:
  voider-net:
    driver: bridge
